<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Dashboard</title>
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a24;
  --bg3: #22222f;
  --border: #2e2e3e;
  --text: #f0f0f8;
  --text2: #a0a0b8;
  --text3: #606078;
  --accent: #7c6cfc;
  --accent2: #5a4de0;
  --green: #3ecf8e;
  --yellow: #f5c542;
  --red: #f56060;
  --blue: #4da6ff;
}
.light {
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --bg3: #eaedf5;
  --border: #d0d5e8;
  --text: #1a1a2e;
  --text2: #555570;
  --text3: #9999b0;
  --accent: #5a4de0;
  --accent2: #7c6cfc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  overflow: hidden;
}
#app { display: flex; flex-direction: column; height: 100vh; }

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.theme-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  color: var(--text);
}

/* STATS */
.stats {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.stat {
  background: var(--bg3);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 70px;
  text-align: center;
  flex-shrink: 0;
}
.stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* TABS */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.tab {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* BOARD */
.board-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
}
.columns { display: flex; gap: 10px; min-height: 100%; }
.col {
  flex: 1;
  min-width: 0;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.col-header {
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.col-header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

/* CARD */
.card {
  background: var(--bg3);
  border-radius: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:active { border-color: var(--accent); }
.card-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-meta { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; }
.badge {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 4px;
  font-weight: 600;
}
.badge-urgent { background: #f560601a; color: var(--red); }
.badge-auto { background: #4da6ff1a; color: var(--blue); }
.badge-case { background: #3ecf8e1a; color: var(--green); }
.badge-social { background: #7c6cfc1a; color: var(--accent); }
.badge-channel { background: var(--bg2); color: var(--text3); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: #0008;
  z-index: 100;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border-radius: 16px 16px 0 0;
  width: 100%;
  padding: 16px;
  max-height: 70vh;
  overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 12px; }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.modal-row { margin-bottom: 8px; }
.modal-row label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-row p { font-size: 13px; color: var(--text); margin-top: 2px; }
.status-btns { display: flex; gap: 6px; margin-top: 6px; }
.status-btn {
  flex: 1;
  padding: 7px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.status-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* LOADING / ERROR */
.msg-center {
  padding: 30px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.6;
}
.msg-center.error { color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">📊 SMM Dashboard</div>
      <div class="header-sub">P-DTR · Контент-план</div>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Всего</div></div>
    <div class="stat"><div class="stat-num" id="s-queue" style="color:var(--yellow)">—</div><div class="stat-label">Очередь</div></div>
    <div class="stat"><div class="stat-num" id="s-work" style="color:var(--blue)">—</div><div class="stat-label">В работе</div></div>
    <div class="stat"><div class="stat-num" id="s-done" style="color:var(--green)">—</div><div class="stat-label">Готово</div></div>
    <div class="stat"><div class="stat-num" id="s-urgent" style="color:var(--red)">—</div><div class="stat-label">Срочно</div></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="filterTasks('all',this)">Все</div>
    <div class="tab" onclick="filterTasks('urgent',this)">🔴 HIGH</div>
    <div class="tab" onclick="filterTasks('Анатомия Движения',this)">Анатомия</div>
    <div class="tab" onclick="filterTasks('Психосоматика',this)">Психосом.</div>
    <div class="tab" onclick="filterTasks('Нейро-Биомеханика',this)">Нейро</div>
    <div class="tab" onclick="filterTasks('Здоровье Суставов',this)">Суставы</div>
    <div class="tab" onclick="filterTasks('Без боли рядом',this)">Локальные</div>
  </div>

  <div class="board-wrap">
    <div class="columns">
      <div class="col">
        <div class="col-header" style="color:var(--yellow)">
          <div class="dot" style="background:var(--yellow)"></div>Очередь
        </div>
        <div class="col-body" id="col-queue"></div>
      </div>
      <div class="col">
        <div class="col-header" style="color:var(--blue)">
          <div class="dot" style="background:var(--blue)"></div>В работе
        </div>
        <div class="col-body" id="col-work"></div>
      </div>
      <div class="col">
        <div class="col-header" style="color:var(--green)">
          <div class="dot" style="background:var(--green)"></div>Готово
        </div>
        <div class="col-body" id="col-done"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-row"><label>Тип</label><p id="m-type"></p></div>
    <div class="modal-row"><label>Каналы</label><p id="m-channels"></p></div>
    <div class="modal-row"><label>Аудитория</label><p id="m-audience"></p></div>
    <div class="modal-row"><label>SEO-ключ</label><p id="m-seo"></p></div>
    <div class="modal-row"><label>Почему важно</label><p id="m-why"></p></div>
    <div class="modal-row">
      <label>Статус</label>
      <div class="status-btns">
        <div class="status-btn" id="sb-queue" onclick="setStatus('queue')">📋 Очередь</div>
        <div class="status-btn" id="sb-work" onclick="setStatus('work')">⚡ В работе</div>
        <div class="status-btn" id="sb-done" onclick="setStatus('done')">✅ Готово</div>
      </div>
    </div>
  </div>
</div>

<script>
const WEBHOOK_URL = 'https://hook.eu1.make.com/fdxhyyvvbslmzvidpe6auxh74vwf7bp0';

// Telegram
if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

let tasks = [];
let currentFilter = 'all';
let activeTask = null;
let isDark = true;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

async function loadTasks() {
  setLoading();
  try {
    const res = await fetch(WEBHOOK_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const text = new TextDecoder("windows-1252").decode(buf);
    const data = JSON.parse(text);
    // SMM_Top: поле "1" содержит все задачи через \n, поля через ||
    // Формат: Заголовок||Тема||Аудитория||SEO-ключ||Приоритет||Почему важно
    tasks = [];
    data.forEach((row, rowIdx) => {
      const raw = row['1'] || row['0'] || '';
      if (!raw || raw.match(/^\d{4}-\d{2}/)) return;
      const lines = raw.split('\n').filter(l => l.trim());
      lines.forEach((line, lineIdx) => {
        const parts = line.split('||');
        if (parts.length < 2) return;
        const title = parts[0].trim();
        const theme = parts[1] ? parts[1].trim() : '';
        const audience = parts[2] ? parts[2].trim() : 'Все';
        const seoKey = parts[3] ? parts[3].trim() : '';
        const priority = parts[4] ? parts[4].trim() : 'MEDIUM';
        const why = parts[5] ? parts[5].trim() : '';
        const status = (row['2'] || 'queue').toLowerCase();
        tasks.push({
          id: rowIdx + '-' + lineIdx,
          rowNum: row.__ROW_NUMBER__,
          lineIdx: lineIdx,
          type: 'social',
          category: theme || 'Соцсети',
          title: title,
          urgent: priority === 'HIGH',
          status: status,
          channels: theme,
          audience: audience,
          seoKey: seoKey,
          why: why
        });
      });
    });
    render();
    updateStats();
  } catch(e) {
    setError(e.message);
  }
}

function setLoading() {
  ['queue','work','done'].forEach(s => {
    document.getElementById('col-' + s).innerHTML =
      '<div class="msg-center">Загружаю...</div>';
  });
}

function setError(msg) {
  document.getElementById('col-queue').innerHTML =
    `<div class="msg-center error">Ошибка загрузки:<br>${msg}<br><br><button onclick="loadTasks()" style="margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">Повторить</button></div>`;
  document.getElementById('col-work').innerHTML = '';
  document.getElementById('col-done').innerHTML = '';
}

function getFiltered() {
  if (currentFilter === 'urgent') return tasks.filter(t => t.urgent);
  if (currentFilter === 'all') return tasks;
  return tasks.filter(t => t.category === currentFilter || t.audience === currentFilter);
}

function render() {
  const filtered = getFiltered();
  ['queue','work','done'].forEach(status => {
    const col = document.getElementById('col-' + status);
    const items = filtered.filter(t => t.status === status);
    if (items.length === 0) {
      col.innerHTML = '<div class="msg-center" style="font-size:11px">пусто</div>';
      return;
    }
    col.innerHTML = items.map(t => cardHTML(t)).join('');
  });
}

function cardHTML(t) {
  const urgentBadge = t.urgent ? `<span class="badge badge-urgent">🔴 HIGH</span>` : `<span class="badge badge-social">MEDIUM</span>`;
  const themeBadge = t.category ? `<span class="badge badge-channel">${t.category}</span>` : '';
  const audienceBadge = t.audience ? `<span class="badge badge-case">${t.audience}</span>` : '';
  return `<div class="card" onclick="openModal('${t.id}')">
    <div class="card-title">${t.title}</div>
    <div class="card-meta">${urgentBadge}${themeBadge}${audienceBadge}</div>
  </div>`;
}

function updateStats() {
  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-queue').textContent = tasks.filter(t=>t.status==='queue').length;
  document.getElementById('s-work').textContent = tasks.filter(t=>t.status==='work').length;
  document.getElementById('s-done').textContent = tasks.filter(t=>t.status==='done').length;
  document.getElementById('s-urgent').textContent = tasks.filter(t=>t.urgent).length;
}

function filterTasks(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function openModal(id) {
  activeTask = tasks.find(t => t.id == id);
  if (!activeTask) return;
  document.getElementById('m-title').textContent = activeTask.title;
  document.getElementById('m-type').textContent =
    activeTask.category || 'Соцсети';
  document.getElementById('m-channels').textContent = activeTask.channels || '—';
  document.getElementById('m-audience').textContent = activeTask.audience || '—';
  document.getElementById('m-seo').textContent = activeTask.seoKey || '—';
  document.getElementById('m-why').textContent = activeTask.why || '—';
  ['queue','work','done'].forEach(s => {
    document.getElementById('sb-' + s).classList.toggle('active', activeTask.status === s);
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function setStatus(status) {
  if (!activeTask) return;
  activeTask.status = status;
  ['queue','work','done'].forEach(s => {
    document.getElementById('sb-' + s).classList.toggle('active', s === status);
  });
  render();
  updateStats();
}

loadTasks();
</script>
</body>
</html>
