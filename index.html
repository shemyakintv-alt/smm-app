<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D1B2A;
  --s1:rgba(255,255,255,0.06);
  --s2:rgba(255,255,255,0.10);
  --b1:rgba(255,255,255,0.10);
  --b2:rgba(255,255,255,0.22);
  --t1:#FFFFFF;
  --t2:rgba(255,255,255,0.55);
  --t3:rgba(255,255,255,0.30);
  --blue:#5B9BD5;
  --blue2:#7FB3E3;
  --green:#4CAF8A;
  --amber:#E8A44A;
  --red:#E06B6B;
  --purple:#8B7FD4;
  --pink:#D47FA0;
  --r:16px;--rs:12px;--rx:8px
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overscroll-behavior:none;background-image:radial-gradient(ellipse at 15% 0%,rgba(91,155,213,0.18) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(44,95,138,0.15) 0%,transparent 55%)}

/* TABS */
.tabs{display:flex;background:rgba(13,27,42,0.97);border-bottom:0.5px solid var(--b1);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.tab{flex:1;padding:12px 6px 10px;font-size:12px;font-weight:600;text-align:center;color:var(--t3);border:none;background:none;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab .tab-icon{font-size:18px}
.tab.active{color:var(--blue)}
.tab.active::after{content:'';display:block;width:24px;height:2.5px;background:var(--blue);border-radius:2px;margin-top:6px}

/* HEADER */
.header{background:rgba(13,27,42,0.97);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--b1)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7BAFD4,#3A6F9E);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-title{font-size:15px;font-weight:700;letter-spacing:-0.02em}
.logo-sub{font-size:11px;color:var(--t2);margin-top:1px}
.online-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.online-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(76,175,138,0.7)}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--b1)}
.stat{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--rs);padding:10px 6px;text-align:center}
.stat-num{font-size:22px;font-weight:700;line-height:1;letter-spacing:-0.03em}
.stat-label{font-size:9px;color:var(--t2);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500}

/* TOOLBAR */
.toolbar{padding:10px 16px;border-bottom:0.5px solid var(--b1);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap;display:flex;gap:7px}
.toolbar::-webkit-scrollbar{display:none}
.fbtn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;border:1px solid var(--b1);background:var(--s1);color:var(--t2);border-radius:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.fbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.fbtn:active{transform:scale(0.94)}

/* KANBAN */
.kanban{display:flex;gap:10px;padding:12px 16px 100px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:flex-start;scrollbar-width:none}
.kanban::-webkit-scrollbar{display:none}
.col{flex:0 0 280px;background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:12px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--t2)}
.col-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--s2)}

/* CARD */
.card{background:rgba(255,255,255,0.04);border:0.5px solid var(--b1);border-radius:var(--rs);padding:13px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.card:last-child{margin-bottom:0}
.card:active{transform:scale(0.97);opacity:0.85}
.card.urgent{border-left:3px solid var(--red)}
.card.auto{border-left:3px solid var(--blue);opacity:0.7}

.card-type{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.type-icon{font-size:14px}
.type-label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.05em}
.auto-badge{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(91,155,213,0.2);color:var(--blue2);font-weight:600;margin-left:auto}

.card-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:6px}
.card-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.card-deadline{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:6px;display:inline-flex;align-items:center;gap:4px}
.deadline-today{background:rgba(224,107,107,0.2);color:#FF9A9A}
.deadline-soon{background:rgba(232,164,74,0.2);color:#FFBB66}
.deadline-ok{background:rgba(76,175,138,0.2);color:#6DDBB0}

.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{padding:7px 14px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;border-radius:20px;cursor:pointer;border:1px solid var(--b1);background:var(--s1);color:var(--t2);transition:all 0.15s;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn:active{transform:scale(0.94)}

/* LIST VIEW */
.list{padding:12px 16px 100px}
.list-card{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--rs);padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.list-card:active{transform:scale(0.98)}
.list-card.urgent{border-left:3px solid var(--red)}
.list-card.auto-task{opacity:0.65}

.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.b-high{background:rgba(224,107,107,0.2);color:#FF8A8A;border:0.5px solid rgba(224,107,107,0.25)}
.b-med{background:rgba(232,164,74,0.2);color:#FFBB66;border:0.5px solid rgba(232,164,74,0.25)}
.b-new{background:rgba(91,155,213,0.2);color:var(--blue2);border:0.5px solid rgba(91,155,213,0.25)}
.b-work{background:rgba(139,127,212,0.2);color:#ADA3F0;border:0.5px solid rgba(139,127,212,0.25)}
.b-done{background:rgba(76,175,138,0.2);color:#6DDBB0;border:0.5px solid rgba(76,175,138,0.25)}
.b-auto{background:rgba(91,155,213,0.15);color:var(--blue2)}
.b-manual{background:rgba(232,164,74,0.15);color:#FFBB66}

/* PANEL */
.panel{position:fixed;left:0;right:0;bottom:0;background:#0F1E2E;border-top:0.5px solid var(--b2);border-radius:24px 24px 0 0;padding:6px 20px 50px;z-index:100;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1)}
.panel.open{transform:translateY(0)}
.panel-handle{width:38px;height:4px;background:var(--b2);border-radius:2px;margin:8px auto 18px}
.panel-title{font-size:17px;font-weight:700;line-height:1.35;margin-bottom:14px;letter-spacing:-0.02em}
.panel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid var(--b1);gap:12px}
.panel-label{font-size:12px;color:var(--t2);flex-shrink:0}
.panel-value{font-size:12px;color:var(--t1);font-weight:500;text-align:right}
.panel-section{margin-top:18px}
.panel-section-title{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);font-weight:700;margin-bottom:10px}
.ai-box{background:rgba(91,155,213,0.08);border:0.5px solid rgba(91,155,213,0.2);border-radius:var(--rs);padding:13px;margin-top:10px;font-size:12px;line-height:1.7;color:var(--t2);white-space:pre-wrap}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.ai-btn{padding:10px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;border-radius:var(--rs);cursor:pointer;border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all 0.15s;text-align:center}
.ai-btn:active{transform:scale(0.95)}
.ai-btn-full{grid-column:1/-1}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:90;display:none;backdrop-filter:blur(3px)}
.overlay.show{display:block}

.loading-dots span{animation:blink 1.2s infinite;display:inline-block}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.empty{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px}

/* SCHEDULE VIEW */
.week-grid{padding:12px 16px 100px}
.week-day{margin-bottom:16px}
.week-day-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3);margin-bottom:8px;padding:0 2px}
.week-item{display:flex;align-items:center;gap:10px;background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--rx);padding:10px 12px;margin-bottom:6px}
.week-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.week-item-text{font-size:13px;font-weight:500;flex:1}
.week-item-platform{font-size:10px;color:var(--t3)}
.week-item-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
</style>
</head>

];

const schedule = [
  {day:'Понедельник',items:[{text:'Публикация статьи Дзен',platform:'Дзен',status:'auto',color:'var(--blue)'},{text:'Пост в Instagram — живой кейс',platform:'Instagram',status:'manual',color:'var(--amber)'}]},
  {day:'Вторник',items:[{text:'Публикация статьи Дзен',platform:'Дзен',status:'auto',color:'var(--blue)'},{text:'Stories за кулисами',platform:'Instagram',status:'manual',color:'var(--amber)'}]},
  {day:'Среда',items:[{text:'Публикация статьи Дзен',platform:'Дзен',status:'auto',color:'var(--blue)'},{text:'Пост TG канал',platform:'Telegram',status:'manual',color:'var(--amber)'},{text:'Публикация MAX видео',platform:'MAX',status:'manual',color:'var(--amber)'}]},
  {day:'Четверг',items:[{text:'Публикация статьи Дзен',platform:'Дзен',status:'auto',color:'var(--blue)'},{text:'Точечный пост Instagram',platform:'Instagram',status:'manual',color:'var(--amber)'}]},
  {day:'Пятница',items:[{text:'Публикация статьи Дзен',platform:'Дзен',status:'auto',color:'var(--blue)'},{text:'Пост ВКонтакте',platform:'ВК',status:'manual',color:'var(--purple)'}]},
  {day:'Суббота',items:[{text:'Дайджест недели TG',platform:'Telegram',status:'manual',color:'var(--amber)'}]},
  {day:'Воскресенье',items:[{text:'AI Аналитик обновляет темы',platform:'Система',status:'auto',color:'var(--blue)'},{text:'SMM получает топ тем',platform:'Dashboard',status:'auto',color:'var(--blue)'}]},
];

let boardFilter = 'ALL';
let topicFilter = 'ALL';
let currentTab = 'board';

function updateStats() {
  const manual = tasks.filter(t=>!t.auto);
  document.getElementById('s-total').textContent = manual.length;
  document.getElementById('s-urgent').textContent = manual.filter(t=>t.priority==='HIGH'&&t.status!=='Готово').length;
  document.getElementById('s-work').textContent = tasks.filter(t=>t.status==='В работе').length;
  document.getElementById('s-done').textContent = tasks.filter(t=>t.status==='Готово').length;
}

function getFilteredTasks() {
  return tasks.filter(t => {
    if(boardFilter==='MANUAL') return !t.auto;
    if(boardFilter==='CASE') return t.type==='CASE';
    if(boardFilter==='SOCIAL') return t.type==='SOCIAL';
    if(boardFilter==='AUTO') return t.auto;
    return true;
  });
}

function deadlineHTML(d) {
  if(d==='today') return `<span class="card-deadline deadline-today">🔴 Сегодня</span>`;
  if(d==='soon') return `<span class="card-deadline deadline-soon">🟡 На неделе</span>`;
  return `<span class="card-deadline deadline-ok">✓ Не горит</span>`;
}

function renderKanban() {
  const filtered = getFilteredTasks();
  const cols = [
    {key:'Новая',title:'Очередь',color:'var(--t3)'},
    {key:'В работе',title:'В работе',color:'var(--purple)'},
    {key:'Готово',title:'Готово',color:'var(--green)'},
  ];
  document.getElementById('kanban').innerHTML = cols.map(col => {
    const cards = filtered.filter(t=>t.status===col.key);
    return `
      <div class="col">
        <div class="col-header">
          <span class="col-title" style="color:${col.color}">${col.title}</span>
          <span class="col-count">${cards.length}</span>
        </div>
        ${cards.length===0?'<div style="font-size:12px;color:var(--t3);text-align:center;padding:20px 0">Пусто</div>':
          cards.map(t=>`
            <div class="card${t.priority==='HIGH'&&!t.auto?' urgent':''}${t.auto?' auto':''}" onclick="openTaskPanel(${t.id})">
              <div class="card-type">
                <span class="type-icon">${t.icon}</span>
                <span class="type-label">${t.label}</span>
                ${t.auto?'<span class="auto-badge">авто</span>':''}
              </div>
              <div class="card-title">${t.title}</div>
              <div class="card-meta">📲 ${t.platform}</div>
              ${deadlineHTML(t.deadline)}
              ${!t.auto&&t.status!=='Готово'?`
                <div class="card-actions" onclick="event.stopPropagation()">
                  ${t.status==='Новая'?`<button class="btn btn-blue btn-sm" onclick="setTaskStatus(${t.id},'В работе')">Взять →</button>`:''}
                  ${t.status==='В работе'?`<button class="btn btn-green btn-sm" onclick="setTaskStatus(${t.id},'Готово')">Готово ✓</button>`:''}
                </div>`:''
              }
            </div>
          `).join('')
        }
      </div>
    `;
  }).join('');
}

function renderTopics() {
  const filtered = topics.filter(t => {
    if(topicFilter==='HIGH') return t.priority==='HIGH'&&t.status!=='Опубликовано';
    if(topicFilter==='MEDIUM') return t.priority==='MEDIUM'&&t.status!=='Опубликовано';
    if(topicFilter==='DONE') return t.status==='Опубликовано';
    return true;
  });
  const PRIORITY = {HIGH:{cls:'b-high',label:'Срочно'},MEDIUM:{cls:'b-med',label:'Обычное'}};
  const STATUS = {'Новая':'b-new','В работе':'b-work','Опубликовано':'b-done'};
  document.getElementById('topics-list').innerHTML = filtered.map(t=>`
    <div class="list-card" onclick="openTopicPanel(${t.id})">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span class="badge ${PRIORITY[t.priority].cls}">${PRIORITY[t.priority].label}</span>
        <span class="badge ${STATUS[t.status]}">${t.status}</span>
        <span class="badge b-auto">${t.channel}</span>
      </div>
      <div style="font-size:14px;font-weight:600;line-height:1.35;margin-bottom:6px">${t.title}</div>
      <div style="font-size:11px;color:var(--t3)">🔍 ${t.seo} · ${t.audience}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:3px">${t.reason}</div>
    </div>
  `).join('');
}

function renderSchedule() {
  document.getElementById('week-grid').innerHTML = schedule.map(day=>`
    <div class="week-day">
      <div class="week-day-title">${day.day}</div>
      ${day.items.map(item=>`
        <div class="week-item">
          <div class="week-item-dot" style="background:${item.color}"></div>
          <div style="flex:1">
            <div class="week-item-text">${item.text}</div>
            <div class="week-item-platform">${item.platform}</div>
          </div>
          <span class="week-item-status ${item.status==='auto'?'b-auto':'b-manual'} badge">${item.status==='auto'?'🤖 Авто':'👤 Оля'}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['board','topics','schedule','ai'].forEach(t=>{
    const el = document.getElementById('tab-'+t);
    if(el) el.style.display = t===tab?'block':'none';
  });
}

function setBoardFilter(f,btn) {
  boardFilter=f;
  document.querySelectorAll('#tab-board .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderKanban();
}

function setTopicFilter(f,btn) {
  topicFilter=f;
  document.querySelectorAll('#tab-topics .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

function setTaskStatus(id,status) {
  const t=tasks.find(t=>t.id===id);
  if(t){t.status=status;updateStats();renderKanban();}
  if(window.Telegram?.WebApp)Telegram.WebApp.HapticFeedback.impactOccurred('light');
}

function openTaskPanel(id) {
  const t=tasks.find(t=>t.id===id);
  document.getElementById('panel-content').innerHTML=`
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <span class="badge ${t.priority==='HIGH'?'b-high':'b-med'}">${t.priority==='HIGH'?'Срочно':'Обычное'}</span>
      ${t.auto?'<span class="badge b-auto">Автоматически</span>':'<span class="badge b-manual">Вручную</span>'}
    </div>
    <div class="panel-title">${t.title}</div>
    <div class="panel-row"><span class="panel-label">Тип</span><span class="panel-value">${t.icon} ${t.label}</span></div>
    <div class="panel-row"><span class="panel-label">Платформа</span><span class="panel-value">${t.platform}</span></div>
    <div class="panel-row"><span class="panel-label">Статус</span><span class="panel-value">${t.status}</span></div>
    ${t.note?`<div class="panel-row" style="border:none"><span class="panel-label">Заметка</span><span class="panel-value">${t.note}</span></div>`:''}
    ${!t.auto?`
    <div class="panel-section">
      <div class="panel-section-title">Статус</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${['Новая','В работе','Готово'].map(s=>`<button class="btn${t.status===s?' btn-blue':''}" onclick="setTaskStatus(${t.id},'${s}');closePanel()">${s}</button>`).join('')}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">AI помощь</div>
      <div class="ai-grid">
        <button class="ai-btn" onclick="generateForTask(${t.id},'instagram')">📸 Instagram</button>
        <button class="ai-btn" onclick="generateForTask(${t.id},'telegram')">💬 Telegram</button>
        <button class="ai-btn" onclick="generateForTask(${t.id},'max')">🎬 MAX</button>
        <button class="ai-btn" onclick="generateForTask(${t.id},'vk')">🔵 ВКонтакте</button>
        <button class="ai-btn ai-btn-full btn-blue" onclick="generateForTask(${t.id},'all')">⚡ Все платформы сразу</button>
      </div>
      <div id="task-ai-result"></div>
    </div>`:''}
  `;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  if(window.Telegram?.WebApp)Telegram.WebApp.HapticFeedback.impactOccurred('medium');
}

function openTopicPanel(id) {
  const t=topics.find(t=>t.id===id);
  const STATUS={'Новая':'b-new','В работе':'b-work','Опубликовано':'b-done'};
  document.getElementById('panel-content').innerHTML=`
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <span class="badge ${t.priority==='HIGH'?'b-high':'b-med'}">${t.priority==='HIGH'?'Срочно':'Обычное'}</span>
      <span class="badge ${STATUS[t.status]}">${t.status}</span>
    </div>
    <div class="panel-title">${t.title}</div>
    <div class="panel-row"><span class="panel-label">Канал</span><span class="panel-value">${t.channel}</span></div>
    <div class="panel-row"><span class="panel-label">Аудитория</span><span class="panel-value">${t.audience}</span></div>
    <div class="panel-row"><span class="panel-label">SEO-ключ</span><span class="panel-value">${t.seo}</span></div>
    <div class="panel-row" style="border:none"><span class="panel-label">Почему зайдёт</span><span class="panel-value">${t.reason}</span></div>
    <div class="panel-section">
      <div class="panel-section-title">AI план статьи</div>
      <button class="btn btn-blue" style="width:100%;padding:12px;font-size:13px" onclick="generateTopicPlan(${t.id})">⚡ Сгенерировать план</button>
      <div id="topic-plan-result"></div>
    </div>
  `;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  if(window.Telegram?.WebApp)Telegram.WebApp.HapticFeedback.impactOccurred('medium');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

async function callAI(prompt, resultId) {
  const result=document.getElementById(resultId);
  result.innerHTML='<div class="ai-box"><div class="loading-dots"><span>•</span><span>•</span><span>•</span> генерирую</div></div>';
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    result.innerHTML=`<div class="ai-box">${data.content?.[0]?.text||'Ошибка'}</div>`;
  } catch(e){result.innerHTML='<div class="ai-box">Ошибка соединения</div>';}
}

async function generateForTask(id,platform) {
  const t=tasks.find(t=>t.id===id);
  const platforms={
    instagram:`Напиши пост для Instagram студии P-DTR (нейромышечная коррекция, Москва, Автозаводская).\nТема: "${t.title}"\nСтиль: живой, с хуком, эмодзи уместно. Добавь призыв записаться.\nОбъём: 150-200 слов + 5 хэштегов.`,
    telegram:`Напиши пост для Telegram канала студии P-DTR.\nТема: "${t.title}"\nСтиль: информативный, без лишнего, с ссылкой на запись.\nОбъём: 100-150 слов.`,
    max:`Напиши описание для видео MAX канала студии P-DTR.\nТема: "${t.title}"\nВключи: крючок в первых 2 строках, суть видео, призыв к действию.\nОбъём: 80-120 слов.`,
    vk:`Напиши пост для ВКонтакте студии P-DTR.\nТема: "${t.title}"\nСтиль: доступный, с историей или фактом, призыв записаться.\nОбъём: 120-180 слов + 7 хэштегов.`,
    all:`Напиши тексты для всех платформ студии P-DTR (нейромышечная коррекция, Москва, Автозаводская).\nТема: "${t.title}"\n\nДай:\n1. Instagram (150 слов + хэштеги)\n2. Telegram (100 слов)\n3. MAX видео (80 слов)\n4. ВКонтакте (150 слов + хэштеги)\n\nФормат: чистый текст с заголовками платформ.`
  };
  await callAI(platforms[platform],'task-ai-result');
}

async function generateTopicPlan(id) {
  const t=topics.find(t=>t.id===id);
  await callAI(`Краткий план статьи Яндекс Дзен для P-DTR студии.\nТема: "${t.title}"\nSEO-ключ: "${t.seo}"\nАудитория: ${t.audience}\n\nДай: 3 H2 заголовка, структуру 4 блоков, призыв к записи, промпт для картинки.\nФормат: чистый текст.`,'topic-plan-result');
}

async function generateAI(platform) {
  const prompts={
    instagram:`Напиши 3 варианта поста для Instagram студии P-DTR (нейромышечная коррекция, Москва, м.Автозаводская).\nКаждый вариант: разный угол (боль, кейс, метод), хук в первых строках, призыв записаться.\nДобавь 5 хэштегов. Формат: чистый текст.`,
    telegram:`Напиши 2 поста для Telegram канала студии P-DTR.\n1-й: про конкретный случай/симптом\n2-й: про метод P-DTR просто и понятно\nКаждый 100-120 слов.`,
    max:`Напиши 3 идеи для коротких видео MAX канала студии P-DTR + описание для каждого (80 слов).\nФормат: Идея → Описание.`,
    vk:`Напиши первый пост-знакомство для ВКонтакте студии P-DTR.\nРасскажи что такое P-DTR, чем отличается от массажа и мануальной терапии, куда записаться.\n150 слов + хэштеги.`,
    case:`Дай структуру поста с живым кейсом для всех платформ студии P-DTR.\nФормат кейса: Симптом → Ошибочные диагнозы → Что нашли на P-DTR диагностике → Результат → Призыв.\nАдаптируй для Instagram, Telegram, MAX, ВК.`
  };
  document.getElementById('ai-result').innerHTML='';
  await callAI(prompts[platform],'ai-result');
}

// INIT
updateStats();
renderKanban();
renderTopics();
renderSchedule();
</script>
</body>
</html>
